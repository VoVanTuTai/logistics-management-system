<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Nexus Express System Logo</title>
  <desc>Logo giao vận Nexus Express System với xe tải 2 bánh gọn gàng và bưu kiện</desc>

  <rect x="30" y="20" width="620" height="260" rx="16" fill="#E6F1FB"/>

  <!-- Speed lines (left) -->
  <line x1="48" y1="145" x2="65" y2="145" stroke="#378ADD" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="156" x2="61" y2="156" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="134" x2="61" y2="134" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>

  <!-- Cargo box -->
  <rect x="120" y="100" width="155" height="85" rx="5" fill="#0C447C"/>
  <line x1="197" y1="102" x2="197" y2="183" stroke="#185FA5" stroke-width="1.5"/>
  <line x1="122" y1="142" x2="273" y2="142" stroke="#185FA5" stroke-width="1"/>
  <text x="197" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#378ADD" letter-spacing="1">NXS</text>
  <text x="197" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#85B7EB" letter-spacing="3">EXPRESS</text>

  <!-- Cabin -->
  <rect x="65" y="115" width="58" height="70" rx="6" fill="#185FA5"/>
  <rect x="65" y="108" width="58" height="13" rx="5" fill="#0C447C"/>
  <rect x="72" y="121" width="32" height="26" rx="3" fill="#B5D4F4"/>
  <rect x="63" y="182" width="212" height="8" rx="2" fill="#0C447C"/>

  <!-- Wheels -->
  <circle cx="105" cy="197" r="17" fill="#042C53"/>
  <circle cx="105" cy="197" r="8" fill="#185FA5"/>
  <circle cx="105" cy="197" r="3" fill="#B5D4F4"/>

  <circle cx="233" cy="197" r="17" fill="#042C53"/>
  <circle cx="233" cy="197" r="8" fill="#185FA5"/>
  <circle cx="233" cy="197" r="3" fill="#B5D4F4"/>

  <!-- Ground line -->
  <line x1="48" y1="214" x2="630" y2="214" stroke="#85B7EB" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Packages -->
  <rect x="278" y="148" width="34" height="30" rx="3" fill="#185FA5"/>
  <line x1="278" y1="163" x2="312" y2="163" stroke="#85B7EB" stroke-width="1.2"/>
  <line x1="295" y1="148" x2="295" y2="178" stroke="#85B7EB" stroke-width="1.2"/>

  <rect x="282" y="130" width="24" height="20" rx="3" fill="#378ADD"/>
  <line x1="282" y1="140" x2="306" y2="140" stroke="#B5D4F4" stroke-width="1"/>
  <line x1="294" y1="130" x2="294" y2="150" stroke="#B5D4F4" stroke-width="1"/>
  <circle cx="294" cy="129" r="4" fill="#B5D4F4"/>

  <rect x="314" y="158" width="22" height="20" rx="3" fill="#0C447C"/>
  <line x1="314" y1="168" x2="336" y2="168" stroke="#378ADD" stroke-width="1"/>
  <line x1="325" y1="158" x2="325" y2="178" stroke="#378ADD" stroke-width="1"/>

  <!-- Location pin -->
  <path d="M368 74 C361 74 354 80 354 88 C354 97 368 112 368 112 C368 112 382 97 382 88 C382 80 375 74 368 74Z" fill="#378ADD"/>
  <circle cx="368" cy="88" r="5" fill="#E6F1FB"/>

  <!-- Text -->
  <text x="393" y="125" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#0C447C" letter-spacing="2">NEXUS</text>
  <text x="393" y="165" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#185FA5" letter-spacing="6">EXPRESS</text>
  <rect x="393" y="175" width="220" height="3" rx="2" fill="#378ADD"/>
  <text x="395" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#378ADD" letter-spacing="10">SYSTEM</text>
  <text x="395" y="236" font-family="Arial, sans-serif" font-size="11" fill="#185FA5" letter-spacing="0.5">Chuyển phát · Quản lý kho · Giao vận</text>
</svg>
